<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bubble Pop Game</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    /* Deep blue/purple gradient for better contrast */
    background: radial-gradient(circle at center, #2b32b2, #1488cc);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    height: 100%;
    user-select: none;
  }
  #scoreBoard {
    position: fixed;
    top: 20px;
    left: 20px;
    font-size: 24px;
    font-weight: bold;
    background: rgba(0,0,0,0.4);
    padding: 10px 20px;
    border-radius: 30px;
    z-index: 10;
    color: white;
    border: 2px solid rgba(255,255,255,0.2);
    pointer-events: none;
  }
  #menuPanel {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    background: rgba(0, 0, 0, 0.85);
    padding: 40px;
    border-radius: 20px;
    display: none; /* Hidden by default */
    color: white;
    border: 4px solid rgba(255,255,255,0.1);
    box-shadow: 0 0 50px rgba(0,0,0,0.5);
    width: 90%;
    max-width: 400px;
    backdrop-filter: blur(10px);
    z-index: 20;
  }
  .title {
    font-size: 40px;
    margin-bottom: 20px;
    color: #fff;
    text-shadow: 0 0 10px #00ffff;
  }
  .score-item {
    font-size: 18px;
    margin: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    padding-bottom: 4px;
  }
  button.action-btn {
      margin-top: 25px;
      padding: 15px 40px;
      font-size: 22px;
      border: none;
      background: linear-gradient(45deg, #ff00cc, #333399);
      color: #fff;
      border-radius: 50px;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 0 10px 20px rgba(0,0,0,0.4);
      transition: transform 0.2s, box-shadow 0.2s;
  }
  button.action-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px #ff00cc;
  }
  button.action-btn:active {
      transform: scale(0.95);
  }
</style>
</head>
<body>

<div id="scoreBoard">Score: 0</div>
<canvas id="gameCanvas"></canvas>

<div id="menuPanel">
  <div class="title" id="menuTitle">BUBBLE POP</div>
  <div id="scoreList"></div>
  <button class="action-btn" onclick="startGame()">PLAY</button>
</div>

<script>
/* --- SETUP --- */
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('scoreBoard');
const menuPanel = document.getElementById('menuPanel');
const scoreList = document.getElementById('scoreList');
const menuTitle = document.getElementById('menuTitle');

let balls = [];
let splatters = [];
let score = 0;
let clickCount = 0;
let isPlaying = false;
let globalShake = {x:0, y:0, duration:0};

/* --- SAFE STORAGE WRAPPER --- */
// Wraps localStorage in try/catch to prevent game crash if blocked
const Storage = {
    get: () => {
        try {
            return JSON.parse(localStorage.getItem('bubbleHighScores')) || {week: 0, scores: []};
        } catch(e) {
            console.warn("Storage disabled");
            return {week: 0, scores: []}; // Return dummy data
        }
    },
    set: (data) => {
        try {
            localStorage.setItem('bubbleHighScores', JSON.stringify(data));
        } catch(e) {}
    }
};

/* --- CANVAS SIZING --- */
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

/* --- GAME ENTITIES --- */
function spawnBall() {
  const r = Math.random() * 35 + 15; // 15px to 50px radius
  balls.push({
    x: Math.random() * (canvas.width - r*2) + r,
    y: Math.random() * (canvas.height - r*2) + r,
    r: r,
    dx: (Math.random() - 0.5) * 1.5,
    dy: (Math.random() - 0.5) * 1.5,
    hue: Math.floor(Math.random() * 360),
    wobble: Math.random() * Math.PI * 2
  });
}

function drawBall(b) {
  b.wobble += 0.05;
  // Subtle shape distortion
  const distortX = Math.cos(b.wobble) * 2; 
  const distortY = Math.sin(b.wobble) * 2;

  const gx = b.x + globalShake.x;
  const gy = b.y + globalShake.y;

  // Gradient fill
  const grad = ctx.createRadialGradient(gx - b.r/3, gy - b.r/3, b.r/10, gx, gy, b.r);
  grad.addColorStop(0, "rgba(255,255,255,0.95)");
  grad.addColorStop(0.3, `hsla(${b.hue}, 80%, 60%, 0.6)`); // More opaque
  grad.addColorStop(1, `hsla(${b.hue}, 90%, 40%, 0.2)`);

  ctx.beginPath();
  // Draw slightly distorted circle
  ctx.ellipse(gx, gy, b.r + distortX, b.r + distortY, 0, 0, Math.PI*2);
  ctx.fillStyle = grad;
  ctx.fill();

  // Strong rim (Border)
  ctx.lineWidth = 2;
  ctx.strokeStyle = `hsla(${b.hue}, 100%, 85%, 0.8)`;
  ctx.stroke();

  // Highlight (Reflection)
  ctx.beginPath();
  ctx.ellipse(gx - b.r/3, gy - b.r/3, b.r/5, b.r/8, Math.PI/4, 0, Math.PI*2);
  ctx.fillStyle = "rgba(255,255,255,0.8)";
  ctx.fill();
}

function createSplatter(x, y, hue) {
  for (let i = 0; i < 8; i++) {
    splatters.push({
      x: x, y: y,
      vx: (Math.random() - 0.5) * 8,
      vy: (Math.random() - 0.5) * 8,
      r: Math.random() * 5 + 2,
      life: 1.0,
      hue: hue
    });
  }
}

function updateAndDraw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Update Balls
  balls.forEach(b => {
    b.x += b.dx;
    b.y += b.dy;
    // Bounce off walls
    if (b.x - b.r < 0 || b.x + b.r > canvas.width) b.dx *= -1;
    if (b.y - b.r < 0 || b.y + b.r > canvas.height) b.dy *= -1;
    drawBall(b);
  });

  // Update Splatters
  for (let i = splatters.length - 1; i >= 0; i--) {
    let s = splatters[i];
    s.x += s.vx;
    s.y += s.vy;
    s.life -= 0.03;
    
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fillStyle = `hsla(${s.hue}, 100%, 70%, ${s.life})`;
    ctx.fill();

    if (s.life <= 0) splatters.splice(i, 1);
  }

  // Shake Logic
  if (globalShake.duration > 0) {
    globalShake.duration--;
    globalShake.x = (Math.random() - 0.5) * 6;
    globalShake.y = (Math.random() - 0.5) * 6;
  } else {
    globalShake.x = 0;
    globalShake.y = 0;
  }

  if (isPlaying || splatters.length > 0) {
    requestAnimationFrame(updateAndDraw);
  }
}

/* --- GAME LOGIC --- */

function startGame() {
  menuPanel.style.display = 'none';
  scoreEl.style.display = 'block';
  
  balls = [];
  splatters = [];
  score = 0;
  clickCount = 0;
  isPlaying = true;
  
  scoreEl.textContent = "Score: 0 | Pops Left: 10";
  
  // Spawn 50 balls
  for(let i=0; i<50; i++) spawnBall();
  
  updateAndDraw();
}

function gameOver() {
  isPlaying = false;
  menuPanel.style.display = 'block';
  scoreEl.style.display = 'none';
  menuTitle.textContent = "GAME OVER";
  
  // Save Score
  const initials = prompt("Enter 3 initials:") || "AAA";
  let data = Storage.get();
  data.scores.push({name: initials.substring(0,3).toUpperCase(), score: Math.floor(score)});
  data.scores.sort((a,b) => b.score - a.score);
  data.scores = data.scores.slice(0, 5); // Keep top 5
  Storage.set(data);
  
  // Render List
  let html = '';
  data.scores.forEach((s, i) => {
    html += `<div class="score-item">#${i+1} ${s.name} ... ${s.score}</div>`;
  });
  scoreList.innerHTML = html;
}

/* --- INPUT --- */
canvas.addEventListener('mousedown', e => {
  if (!isPlaying) return;
  
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  
  let hit = false;
  
  // Check balls (reverse order to click top ones first)
  for (let i = balls.length - 1; i >= 0; i--) {
    let b = balls[i];
    let dist = Math.sqrt((mx - b.x)**2 + (my - b.y)**2);
    
    if (dist < b.r + 5) { // +5 buffer makes clicking easier
      // Score calculation: smaller = more points
      let points = Math.floor((60 - b.r) * 2); 
      score += points;
      
      createSplatter(b.x, b.y, b.hue);
      balls.splice(i, 1);
      
      // Respawn one to keep screen full
      spawnBall();
      
      globalShake.duration = 8;
      hit = true;
      break; // One click = one pop
    }
  }
  
  if (hit) {
    clickCount++;
    let left = 10 - clickCount;
    scoreEl.textContent = `Score: ${Math.floor(score)} | Pops Left: ${left}`;
    if (left <= 0) setTimeout(gameOver, 500);
  }
});

// Touch support
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const touch = e.touches[0];
  canvas.dispatchEvent(new MouseEvent('mousedown', {
    clientX: touch.clientX,
    clientY: touch.clientY
  }));
}, {passive: false});

/* --- INITIALIZATION --- */
// Show menu on load
menuPanel.style.display = 'block';
menuTitle.textContent = "BUBBLE POP";
scoreList.innerHTML = '<div style="margin-bottom:20px; opacity:0.8">Pop the small bubbles<br>for big points!</div>';

</script>
</body>
</html>
