<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Emoji Match</title>
<style>
  :root {
    --bg-color: #2c3e50;
    --card-back: #34495e;
    --card-front: #ecf0f1;
    --accent: #e74c3c;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg-color);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }

  /* === GAME BOARD === */
  .game-board {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 15px;
    width: 90%;
    max-width: 600px;
    aspect-ratio: 1 / 1; /* Keep it square */
  }

  .card {
    background-color: transparent;
    perspective: 1000px;
    cursor: pointer;
    position: relative;
  }

  .card-inner {
    position: relative;
    width: 100%;
    height: 100%;
    text-align: center;
    transition: transform 0.6s;
    transform-style: preserve-3d;
    border-radius: 12px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.3);
  }

  .card.flipped .card-inner {
    transform: rotateY(180deg);
  }

  .card.matched .card-inner {
    transform: rotateY(180deg);
    animation: pulse 0.5s ease-in-out;
  }

  .card-front, .card-back {
    position: absolute;
    width: 100%;
    height: 100%;
    -webkit-backface-visibility: hidden;
    backface-visibility: hidden;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3rem; 
  }

  .card-back {
    background: linear-gradient(135deg, #3498db, #2980b9);
    color: rgba(255,255,255,0.2);
    font-size: 2rem;
  }
  
  /* Question mark on back */
  .card-back::after {
    content: "?";
    font-weight: bold;
  }

  .card-front {
    background-color: var(--card-front);
    color: #333;
    transform: rotateY(180deg);
    border: 4px solid #f1c40f;
  }

  @keyframes pulse {
    0% { transform: rotateY(180deg) scale(1); }
    50% { transform: rotateY(180deg) scale(1.1); }
    100% { transform: rotateY(180deg) scale(1); }
  }

  /* === OVERLAYS === */
  .overlay {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.85);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
    z-index: 100;
    backdrop-filter: blur(5px);
  }

  h1 { font-size: 3rem; margin-bottom: 10px; text-shadow: 0 0 10px #f1c40f; }
  p { font-size: 1.2rem; color: #bdc3c7; margin-bottom: 30px; }

  button {
    padding: 15px 40px;
    font-size: 1.5rem;
    background: #27ae60;
    color: white;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    font-weight: bold;
    box-shadow: 0 5px 15px rgba(39, 174, 96, 0.4);
    transition: transform 0.2s;
  }
  button:hover { transform: scale(1.05); background: #2ecc71; }
  
  .hidden { display: none !important; }

  /* Confetti Container */
  #confetti {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
    z-index: 50;
  }

  /* Responsive Text */
  @media (max-width: 500px) {
    .card-front { font-size: 2rem; }
    .game-board { gap: 8px; }
  }
</style>
</head>
<body>

  <div class="game-board" id="board"></div>
  <canvas id="confetti"></canvas>

  <div id="startOverlay" class="overlay">
    <h1>Memory Match</h1>
    <p>Find matching pairs of emojis!</p>
    <button onclick="startGame()">Start Game</button>
  </div>

  <div id="winOverlay" class="overlay hidden">
    <h1>You Won! 🎉</h1>
    <p>Great memory!</p>
    <button onclick="startGame()">Play Again</button>
  </div>

<script>
  /* === CONFIGURATION === */
  const emojis = ['🐶', '🐱', '🐭', '🐹', '🐰', '🦊', '🐻', '🐼']; 
  // You can change these emojis to anything you like!

  let cards = [];
  let flippedCards = [];
  let matchedPairs = 0;
  let canFlip = false;

  const board = document.getElementById('board');
  const startOverlay = document.getElementById('startOverlay');
  const winOverlay = document.getElementById('winOverlay');

  /* === GAME LOGIC === */
  function startGame() {
    startOverlay.classList.add('hidden');
    winOverlay.classList.add('hidden');
    
    // Reset State
    board.innerHTML = '';
    flippedCards = [];
    matchedPairs = 0;
    canFlip = true;
    
    // Create Deck (Duplicate emojis & Shuffle)
    const deck = [...emojis, ...emojis];
    shuffle(deck);

    // Build Grid
    deck.forEach(emoji => {
      const card = document.createElement('div');
      card.classList.add('card');
      
      const inner = document.createElement('div');
      inner.classList.add('card-inner');
      
      const front = document.createElement('div');
      front.classList.add('card-front');
      front.textContent = emoji;
      
      const back = document.createElement('div');
      back.classList.add('card-back');

      inner.appendChild(front);
      inner.appendChild(back);
      card.appendChild(inner);
      
      card.addEventListener('click', () => flipCard(card, emoji));
      board.appendChild(card);
    });
  }

  function flipCard(card, emoji) {
    // Logic Checks: Can't flip if locked, already flipped, or matched
    if (!canFlip || card.classList.contains('flipped') || card.classList.contains('matched')) return;

    // Flip it
    card.classList.add('flipped');
    flippedCards.push({ element: card, value: emoji });

    // Check match if 2 cards selected
    if (flippedCards.length === 2) {
      checkForMatch();
    }
  }

  function checkForMatch() {
    canFlip = false; // Lock board
    const [card1, card2] = flippedCards;

    if (card1.value === card2.value) {
      // It's a match!
      card1.element.classList.add('matched');
      card2.element.classList.add('matched');
      matchedPairs++;
      flippedCards = [];
      canFlip = true;
      
      // Check Win
      if (matchedPairs === emojis.length) {
        setTimeout(showWin, 800);
      }
    } else {
      // Not a match - flip back after delay
      setTimeout(() => {
        card1.element.classList.remove('flipped');
        card2.element.classList.remove('flipped');
        flippedCards = [];
        canFlip = true;
      }, 1000);
    }
  }

  function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [array[i], array[j]] = [array[j], array[i]];
    }
  }

  function showWin() {
    winOverlay.classList.remove('hidden');
    startConfetti();
  }

  /* === SIMPLE CONFETTI EFFECT === */
  const canvas = document.getElementById('confetti');
  const ctx = canvas.getContext('2d');
  let particles = [];

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  function startConfetti() {
    particles = [];
    for(let i=0; i<100; i++) {
      particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height - canvas.height,
        color: `hsl(${Math.random()*360}, 100%, 50%)`,
        size: Math.random() * 10 + 5,
        speed: Math.random() * 5 + 2,
        wobble: Math.random() * 10
      });
    }
    animateConfetti();
  }

  function animateConfetti() {
    if(winOverlay.classList.contains('hidden')) return; // Stop if closed

    ctx.clearRect(0,0,canvas.width, canvas.height);
    particles.forEach((p, i) => {
      p.y += p.speed;
      p.x += Math.sin(p.wobble);
      
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x, p.y, p.size, p.size);

      if(p.y > canvas.height) particles[i].y = -10;
    });
    requestAnimationFrame(animateConfetti);
  }

</script>
</body>
</html>
