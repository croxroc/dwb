<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Spot Splat</title>
  <style>
    :root{
      --bg: #0f1226;
      --panel: #161a33;
      --accent: #7ee787;
      --text: #e6e6f0;
      --muted: #98a0b3;
      --shake-intensity: 0px;
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif; overflow: hidden; user-select: none;}

    #gameRoot{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
    canvas{position:absolute;inset:0;width:100%;height:100%;display:block;touch-action:none;}

    /* Overlay panels */
    .overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(10,12,24,0.85);backdrop-filter: blur(4px); z-index: 20;}
    .panel{width:min(680px,92vw);background:var(--panel);border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,.5);padding:24px; border: 1px solid rgba(255,255,255,0.1);}
    .row{display:flex;gap:16px;flex-wrap:wrap}
    h1{margin:0 0 6px;font-size:28px; color: #fff;}
    p{margin:8px 0;color:var(--muted)}
    
    button{appearance:none;border:0;border-radius:14px;padding:14px 18px;background:linear-gradient(180deg,#2e3358,#282c52);color:#fff;font-weight:700;cursor:pointer;box-shadow:0 8px 20px rgba(0,0,0,.35); font-size: 16px;}
    button:hover{filter:brightness(1.1); transform: translateY(-1px);}
    button:active{transform: translateY(1px);}
    
    .cta{background:linear-gradient(180deg,#3b82f6,#1f56cc)}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .stat{background:#0f1330;border-radius:12px;padding:10px 12px; border: 1px solid rgba(255,255,255,0.05);}
    .label{font-size:12px;color:var(--muted)}
    .value{font-size:20px;font-weight:800; color: #fff;}

    /* High Score List */
    ol{margin:8px 0 0 20px; color: var(--muted);}
    li{margin:4px 0}

    /* Screen shake */
    #shakeWrap{position:fixed;inset:0; transform-origin: center;}
    .shaking{animation: screen-shake 100ms linear 10;}
    @keyframes screen-shake{
      0%,100%{transform:translate(0,0)}
      20%{transform:translate(calc(var(--shake-intensity) * 1), calc(var(--shake-intensity) * .5))}
      40%{transform:translate(calc(var(--shake-intensity) *-1), calc(var(--shake-intensity) * -.5))}
      60%{transform:translate(calc(var(--shake-intensity) * .7), calc(var(--shake-intensity) * -1))}
      80%{transform:translate(calc(var(--shake-intensity) *-0.7), calc(var(--shake-intensity) * 1))}
    }

    .hidden{display:none !important;}
  </style>
</head>
<body>
  <div id="shakeWrap">
    <div id="gameRoot">
      <canvas id="game"></canvas>

      <div class="overlay" id="startOverlay">
        <div class="panel">
          <h1>🎯 Spot Splat</h1>
          <p>You have <strong>20 clicks</strong>. Splat spots to score — tiny spots are worth the most points. Spots vanish quickly!</p>
          <div class="grid" style="margin-top:10px">
            <div class="stat"><div class="label">Clicks Available</div><div class="value" id="clicksPreview">20</div></div>
            <div class="stat"><div class="label">Status</div><div class="value" style="color:#4ade80">Ready</div></div>
          </div>
          <div class="row" style="margin-top:20px; justify-content: center;">
            <button class="cta" id="btnStart" style="width: 100%;">START GAME</button>
          </div>
          <p style="margin-top:12px;font-size:12px; text-align: center;">Scores reset every Monday.</p>
        </div>
      </div>

      <div class="overlay hidden" id="endOverlay">
        <div class="panel">
          <h1>Game Over</h1>
          <div class="grid">
            <div class="stat"><div class="label">Your Score</div><div class="value" id="finalScore">0</div></div>
            <div class="stat"><div class="label">Personal Best</div><div class="value" id="bestScore">0</div></div>
          </div>
          <div style="margin-top:12px">
            <label for="playerName" class="label">Your Initials</label>
            <input id="playerName" placeholder="ABC" maxlength="3" style="width:100%;padding:12px;border-radius:12px;border:1px solid #2b2f55;background:#0f1330;color:#fff; text-transform:uppercase; font-weight:bold;"/>
            <div class="row" style="margin-top:10px">
              <button class="cta" id="btnSave">Save Score</button>
              <button id="btnPlayAgain">Play Again</button>
            </div>
          </div>
          <div style="margin-top:16px">
            <h3 style="margin:0 0 6px; font-size: 16px; color: #fff;">Recent High Scores</h3>
            <ol id="scoreList"></ol>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script>
  (()=>{
    /* --- CONFIGURATION --- */
    const LIFE_MIN = 800;  
    const LIFE_MAX = 1500; 
    const MAX_VISIBLE = 6;
    const R_MIN = 15;
    const R_MAX = 65;
    const MAX_CLICKS = 20;

    /* --- SAFE STORAGE --- */
    const SafeStorage = {
        get: (key) => {
            try { return JSON.parse(localStorage.getItem(key)); } 
            catch(e) { return null; }
        },
        set: (key, val) => {
            try { localStorage.setItem(key, JSON.stringify(val)); } 
            catch(e) {}
        }
    };

    const LS_KEY = 'spotSplat.scores';
    const WEEK_KEY = 'spotSplat.weekStart';

    function getMondayString(){
      const d = new Date();
      const day = d.getDay();
      const diff = d.getDate() - day + (day === 0 ? -6 : 1);
      const monday = new Date(d.setDate(diff));
      return monday.toDateString();
    }

    function checkWeeklyReset(){
        const currentMonday = getMondayString();
        const savedMonday = SafeStorage.get(WEEK_KEY);
        if(savedMonday !== currentMonday){
            SafeStorage.set(LS_KEY, []);
            SafeStorage.set(WEEK_KEY, currentMonday);
        }
    }
    checkWeeklyReset();

    /* --- GAME ENGINE --- */
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    
    // UI Elements
    const startOverlay = document.getElementById('startOverlay');
    const endOverlay = document.getElementById('endOverlay');
    const clicksPreview = document.getElementById('clicksPreview');
    const finalScoreEl = document.getElementById('finalScore');
    const bestScoreEl = document.getElementById('bestScore');
    const scoreList = document.getElementById('scoreList');
    const nameInput = document.getElementById('playerName');

    // State
    let width, height, dpr;
    let running = false;
    let clicksLeft = MAX_CLICKS;
    let score = 0;
    let spots = [];
    let splats = [];
    let lastTime = 0;

    const COLORS = ['#ff6b6b','#4ade80','#60a5fa','#f472b6','#fbbf24','#a78bfa'];

    function resize(){
      dpr = window.devicePixelRatio || 1;
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width * dpr;
      canvas.height = height * dpr;
      canvas.style.width = width + 'px';
      canvas.style.height = height + 'px';
      ctx.scale(dpr, dpr);
    }
    window.addEventListener('resize', resize);
    resize();

    /* --- LOGIC --- */
    const generateID = () => Date.now().toString(36) + Math.random().toString(36).substr(2);

    function spawnSpot(){
        if(spots.length >= MAX_VISIBLE) return;
        
        let x, y, r, safe = false;
        for(let i=0; i<10; i++){
            r = Math.random() * (R_MAX - R_MIN) + R_MIN;
            x = Math.random() * (width - r*2) + r;
            y = Math.random() * (height - r*2) + r;
            
            let overlap = false;
            for(let s of spots){
                let dist = Math.hypot(x - s.x, y - s.y);
                if(dist < r + s.r + 10) overlap = true;
            }
            if(!overlap) { safe = true; break; }
        }

        if(safe){
            spots.push({
                id: generateID(),
                x: x, y: y, r: r,
                color: COLORS[Math.floor(Math.random() * COLORS.length)],
                born: performance.now(),
                life: Math.random() * (LIFE_MAX - LIFE_MIN) + LIFE_MIN
            });
        }
    }

    function createSplat(x, y, color){
        for(let i=0; i<12; i++){
            const angle = Math.random() * Math.PI * 2;
            const speed = Math.random() * 5 + 2;
            splats.push({
                x: x, y: y,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                r: Math.random() * 6 + 2,
                color: color,
                life: 1.0
            });
        }
    }

    function gameLoop(now){
        if(!running) return;
        
        const dt = (now - lastTime) / 1000;
        lastTime = now;

        ctx.clearRect(0, 0, width, height);

        spots = spots.filter(s => (now - s.born) < s.life);
        
        if(spots.length < MAX_VISIBLE && Math.random() > 0.92) {
            spawnSpot();
        }

        spots.forEach(s => {
            const age = now - s.born;
            const remaining = s.life - age;
            let scale = 1;
            if(remaining < 200) scale = remaining / 200;
            
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.r * scale, 0, Math.PI*2);
            ctx.fillStyle = s.color;
            ctx.fill();
            
            ctx.beginPath();
            ctx.arc(s.x - s.r*0.3, s.y - s.r*0.3, s.r*0.2 * scale, 0, Math.PI*2);
            ctx.fillStyle = 'rgba(255,255,255,0.4)';
            ctx.fill();
        });

        for(let i = splats.length - 1; i >= 0; i--){
            let p = splats[i];
            p.x += p.vx;
            p.y += p.vy;
            p.life -= 0.03;
            
            if(p.life <= 0){
                splats.splice(i, 1);
                continue;
            }

            ctx.globalAlpha = p.life;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
            ctx.fillStyle = p.color;
            ctx.fill();
            ctx.globalAlpha = 1.0;
        }

        requestAnimationFrame(gameLoop);
    }

    /* --- INTERACTION --- */
    function shakeScreen(){
        const wrap = document.getElementById('shakeWrap');
        wrap.style.setProperty('--shake-intensity', '8px');
        wrap.classList.remove('shaking');
        void wrap.offsetWidth; 
        wrap.classList.add('shaking');
        if(navigator.vibrate) navigator.vibrate(50);
    }

    function handleInput(clientX, clientY){
        if(!running || clicksLeft <= 0) return;

        clicksLeft--;
        let hit = false;
        
        for(let i = spots.length - 1; i >= 0; i--){
            let s = spots[i];
            let dist = Math.hypot(clientX - s.x, clientY - s.y);
            
            if(dist < s.r + 10){ 
                let pts = Math.floor(21 - (s.r / R_MAX * 20));
                if(pts < 1) pts = 1;
                
                score += pts;
                createSplat(s.x, s.y, s.color);
                spots.splice(i, 1); 
                shakeScreen();
                hit = true;
                break;
            }
        }

        if(clicksLeft === 0){
            setTimeout(endGame, 800);
        }
    }

    canvas.addEventListener('mousedown', e => handleInput(e.clientX, e.clientY));
    canvas.addEventListener('touchstart', e => {
        e.preventDefault();
        handleInput(e.touches[0].clientX, e.touches[0].clientY);
    }, {passive: false});

    /* --- GAME FLOW --- */
    function startGame(){
        running = true;
        score = 0;
        clicksLeft = MAX_CLICKS;
        spots = [];
        splats = [];
        startOverlay.classList.add('hidden');
        endOverlay.classList.add('hidden');
        
        for(let i=0; i<3; i++) spawnSpot();
        lastTime = performance.now();
        requestAnimationFrame(gameLoop);
    }

    function endGame(){
        running = false;
        finalScoreEl.innerText = score;
        
        let savedScores = SafeStorage.get(LS_KEY) || [];
        let best = 0;
        savedScores.forEach(s => { if(s.score > best) best = s.score; });
        if(score > best) best = score;
        
        bestScoreEl.innerText = best;
        renderScores(savedScores);
        
        endOverlay.classList.remove('hidden');
    }

    function renderScores(list){
        list.sort((a,b) => b.score - a.score);
        list = list.slice(0, 5); 
        
        scoreList.innerHTML = '';
        list.forEach(item => {
            let li = document.createElement('li');
            li.innerHTML = `<strong>${item.name}</strong>: ${item.score}`;
            scoreList.appendChild(li);
        });
    }

    document.getElementById('btnStart').addEventListener('click', () => {
        // No fullscreen request - stays in iframe/window
        startGame();
    });

    document.getElementById('btnSave').addEventListener('click', () => {
        const name = nameInput.value.toUpperCase().substr(0, 3) || '???';
        let list = SafeStorage.get(LS_KEY) || [];
        list.push({name: name, score: score, date: Date.now()});
        SafeStorage.set(LS_KEY, list);
        renderScores(list);
        document.getElementById('btnSave').disabled = true; 
        document.getElementById('btnSave').innerText = "Saved";
    });

    document.getElementById('btnPlayAgain').addEventListener('click', () => {
        document.getElementById('btnSave').disabled = false;
        document.getElementById('btnSave').innerText = "Save Score";
        nameInput.value = '';
        startGame();
    });

  })();
  </script>
</body>
</html>
