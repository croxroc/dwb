<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Magic Wand</title>
<style>
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
    canvas { display: block; cursor: crosshair; }
    #instruction {
        position: absolute; top: 50%; width: 100%; text-align: center;
        color: rgba(255,255,255,0.5); font-family: sans-serif; font-size: 24px;
        pointer-events: none; transition: opacity 1s; user-select: none;
    }
</style>
</head>
<body>

<div id="instruction">Click & Drag to cast spells</div>
<canvas id="canvas"></canvas>

<script>
/* ================= CONFIGURATION ================= */
const imagePath = '../images/heros/'; 
// IMPORTANT: Ensure this matches exactly how many files you have (1.webp ... 10.webp)
const totalCharacters = 10; 
/* ================================================= */

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let width, height;

// State
let shapes = [];
let chars = []; 
let mouse = { x: 0, y: 0, down: false };
let hue = 0;
let loadedImages = [];

function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

/* --- SAFE PRELOADER --- */
// We load images and only add them to the array if they load successfully
for(let i = 1; i <= totalCharacters; i++) {
    const img = new Image();
    img.onload = () => {
        loadedImages.push(img); // Only push if loaded
    };
    img.onerror = () => {
        console.warn(`Failed to load image: ${imagePath}${i}.webp`);
    };
    img.src = `${imagePath}${i}.webp`; 
}

/* --- CLASSES --- */

class Shape {
    constructor(x, y, hue) {
        this.x = x;
        this.y = y;
        this.hue = hue;
        this.angle = Math.random() * Math.PI * 2;
        this.spin = (Math.random() - 0.5) * 0.2;
        this.size = 20 + Math.random() * 30;
        this.sides = Math.floor(Math.random() * 4) + 3; 
        this.life = 1.0;
        this.decay = 0.015;
        this.vel = {
            x: (Math.random() - 0.5) * 4,
            y: (Math.random() - 0.5) * 4
        };
    }

    update() {
        this.x += this.vel.x;
        this.y += this.vel.y;
        this.angle += this.spin;
        this.life -= this.decay;
        this.size *= 0.95; 
    }

    draw(ctx) {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle);
        ctx.beginPath();
        for (let i = 0; i < this.sides; i++) {
            const theta = (i / this.sides) * Math.PI * 2;
            const px = Math.cos(theta) * this.size;
            const py = Math.sin(theta) * this.size;
            if (i === 0) ctx.moveTo(px, py);
            else ctx.lineTo(px, py);
        }
        ctx.closePath();
        ctx.strokeStyle = `hsla(${this.hue}, 100%, 60%, ${this.life})`;
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.fillStyle = `hsla(${this.hue}, 100%, 60%, ${this.life * 0.2})`;
        ctx.fill();
        ctx.restore();
    }
}

class FloatingChar {
    constructor(x, y) {
        // Random offset so it doesn't appear directly under the mouse cursor
        this.x = x + (Math.random() - 0.5) * 100;
        this.y = y + (Math.random() - 0.5) * 100;
        
        // Pick random image safely
        if (loadedImages.length > 0) {
            this.img = loadedImages[Math.floor(Math.random() * loadedImages.length)];
        } else {
            this.img = null;
        }

        this.life = 0; // Start invisible
        this.fadeIn = true;
        this.scale = 0.5; 
        this.targetScale = 1.0; 
        this.vy = -1.5; // Float up speed
    }

    update() {
        this.y += this.vy; 
        
        // Fade in then out
        if (this.fadeIn) {
            this.life += 0.05;
            if (this.life >= 1) this.fadeIn = false;
        } else {
            this.life -= 0.01;
        }
        
        // Grow slightly
        if(this.scale < this.targetScale) {
            this.scale += 0.01;
        }
    }

    draw(ctx) {
        if (!this.img) return; // Safety check prevents freezing
        
        ctx.save();
        ctx.globalAlpha = Math.max(0, Math.min(1, this.life * 0.6)); // Max opacity 0.6 for "Ghost" effect behind wand
        
        const w = 150 * this.scale; 
        const ratio = this.img.height / this.img.width;
        const h = w * ratio;

        ctx.translate(this.x, this.y);
        ctx.drawImage(this.img, -w/2, -h/2, w, h);
        
        ctx.restore();
    }
}

/* --- MAIN LOOP --- */

function loop() {
    // 1. Clear Screen with fade trail
    ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
    ctx.fillRect(0, 0, width, height);

    if (mouse.down) {
        hue += 2;
        shapes.push(new Shape(mouse.x, mouse.y, hue));
        shapes.push(new Shape(mouse.x, mouse.y, hue + 180));
    }

    // 2. LAYER 1: BACKGROUND (Characters)
    // We draw characters FIRST so they appear BEHIND the neon shapes
    for (let i = chars.length - 1; i >= 0; i--) {
        const c = chars[i];
        c.update();
        if (c.life <= 0 && !c.fadeIn) {
            chars.splice(i, 1);
        } else {
            c.draw(ctx);
        }
    }

    // 3. LAYER 2: FOREGROUND (Neon Shapes)
    for (let i = shapes.length - 1; i >= 0; i--) {
        const s = shapes[i];
        s.update();
        if (s.life <= 0 || s.size < 0.5) {
            shapes.splice(i, 1);
        } else {
            s.draw(ctx);
        }
    }

    requestAnimationFrame(loop);
}

// Interaction
const handleMove = (x, y) => {
    mouse.x = x;
    mouse.y = y;
};

const spawnCharacter = () => {
    // Safety check: Don't spawn if no images loaded yet to prevent logic errors
    if (loadedImages.length === 0) return;
    chars.push(new FloatingChar(mouse.x, mouse.y));
};

window.addEventListener('mousedown', e => {
    mouse.down = true;
    handleMove(e.clientX, e.clientY);
    document.getElementById('instruction').style.opacity = 0;
});

window.addEventListener('mouseup', () => {
    if(mouse.down) {
        mouse.down = false;
        spawnCharacter(); 
    }
});

window.addEventListener('mousemove', e => {
    if(mouse.down) handleMove(e.clientX, e.clientY);
});

// Touch support
window.addEventListener('touchstart', e => {
    e.preventDefault();
    mouse.down = true;
    handleMove(e.touches[0].clientX, e.touches[0].clientY);
    document.getElementById('instruction').style.opacity = 0;
}, {passive: false});

window.addEventListener('touchend', () => {
    if(mouse.down) {
        mouse.down = false;
        spawnCharacter();
    }
});

window.addEventListener('touchmove', e => {
    if(mouse.down) handleMove(e.touches[0].clientX, e.touches[0].clientY);
}, {passive: false});

loop();
</script>
</body>
</html>
