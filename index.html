<style>
  * { box-sizing: border-box; }

  html, body {
    height: 100dvh;
    margin: 0;
    padding: 0;
    background: #000;
    overflow: hidden;
    cursor: none;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  /* THE SCALER: This keeps the 1880x1000 stage perfectly proportional */
  .stage {
    position: relative;
    width: 1880px;
    height: 1000px;
    background: #000;
    transform-origin: center center;
    flex-shrink: 0;
    image-rendering: crisp-edges;
  }

  .grid {
    display: grid;
    /* Fixed pixel widths from your design to ensure the grid aligns with slices */
    grid-template-columns: 77px 313px 433px 425px 203px 289px 81px 59px;
    width: 100%;
    height: 100%;
    position: absolute;
    inset: 0;
  }

  .col {
    display: flex;
    flex-direction: column;
  }

  /* Overlap fixes: prevents hairline gaps between columns and images */
  .col + .col {
    margin-left: -1px;
  }

  img {
    display: block;
    margin: 0;
    padding: 0;
    width: 100%;
    height: auto;
    image-rendering: crisp-edges;
    vertical-align: middle;
  }

  .col img + img {
    margin-top: -1px;
  }

  /* GLOW TRAIL */
  .ribbon-dot {
    position: fixed;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    pointer-events: none;
    mix-blend-mode: screen;
    filter: blur(6px);
    animation: fade 0.8s linear forwards;
    z-index: 9999;
  }

  @keyframes fade {
    0% { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(0.4); }
  }

  #cursorAnim {
    position: fixed;
    width: 96px;
    height: 96px;
    pointer-events: none;
    transform: translate(-50%, -50%);
    z-index: 999999;
    background: url('images/icons/dusty.webp') no-repeat center / contain;
    image-rendering: crisp-edges;
  }
</style>
</head>

<body>

<script>
  /* ---------- AUTO-SCALING LOGIC ---------- */
  const stage = document.getElementById('mainStage');
  const baseWidth = 1880;
  const baseHeight = 1000;

  function handleResize() {
    const winW = window.innerWidth;
    const winH = window.innerHeight;
    const scale = Math.min(winW / baseWidth, winH / baseHeight);
    stage.style.transform = `scale(${scale})`;
  }

  window.addEventListener('resize', handleResize);
  window.addEventListener('load', handleResize);
  handleResize();

  /* ---------- GLOW TRAIL ---------- */
  const colors = ['#ff0040','#ff7b00','#ffe600','#2bff00','#00ffc8','#00aaff','#8f00ff'];
  let colorIndex = 0;

  window.addEventListener('mousemove', e => {
    const dot = document.createElement('div');
    dot.className = 'ribbon-dot';
    dot.style.background = colors[colorIndex];
    colorIndex = (colorIndex + 1) % colors.length;
    dot.style.left = (e.clientX - 16) + 'px';
    dot.style.top  = (e.clientY - 16) + 'px';
    document.body.appendChild(dot);
    setTimeout(() => dot.remove(), 800);
  });

  /* ---------- CUSTOM CURSOR ---------- */
  const cursor = document.getElementById('cursorAnim');
  document.addEventListener('mousemove', e => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top  = e.clientY + 'px';
  });

  /* ---------- IMAGE SWAPS ---------- */
  const originals = {};

  function swap(id, file) {
    const img = document.getElementById(id);
    if (!img) return;
    if (!originals[id]) originals[id] = img.src;
    img.src = 'images/' + file;
  }

  function restoreAll() {
    for (const id in originals) {
      const img = document.getElementById(id);
      if (img) img.src = originals[id];
    }
  }

  // Single Swaps
  [['slice20','slice20h.webp'],['slice11','slice11h.webp'],['slice32','slice32h.webp'],['slice40','slice40h.webp']]
  .forEach(([id,file]) => {
    const img = document.getElementById(id);
    if(img){
      img.addEventListener('mouseenter', () => { restoreAll(); swap(id,file); });
      img.addEventListener('mouseleave', restoreAll);
    }
  });

  // Group Swaps
  const groups = {
    slice6:  { slice12:'slice12h.webp', slice18:'slice18m.webp', slice19:'slice19m.webp', slice24:'slice24m.webp' },
    slice7:  { slice13:'slice13h.webp', slice18:'slice18g.webp', slice19:'slice19g.webp', slice24:'slice24g.webp' },
    slice8:  { slice14:'slice14h.webp', slice18:'slice18b.webp', slice19:'slice19b.webp', slice24:'slice24b.webp' },
    slice9:  { slice15:'slice15h.webp', slice18:'slice18a.webp', slice19:'slice19a.webp', slice24:'slice24a.webp' }
  };
  // Aliasing trigger IDs (slice 12 acts like slice 6, etc.)
  groups.slice12 = groups.slice6; groups.slice13 = groups.slice7; 
  groups.slice14 = groups.slice8; groups.slice15 = groups.slice9;

  Object.keys(groups).forEach(triggerId => {
    const trigger = document.getElementById(triggerId);
    if(trigger){
      trigger.addEventListener('mouseenter', () => {
        restoreAll();
        const set = groups[triggerId];
        for (const id in set) swap(id, set[id]);
      });
      trigger.addEventListener('mouseleave', restoreAll);
    }
  });

  /* ---------- NAVIGATION ---------- */
  function go(url) { window.location.href = url; }
  
  const clickMap = {
    slice6: () => go('pages/music.html'), slice12: () => go('pages/music.html'),
    slice7: () => go('pages/games.html'), slice13: () => go('pages/games.html'),
    slice8: () => go('pages/books.html'), slice14: () => go('pages/books.html'),
    slice9: () => go('pages/about.html'), slice15: () => go('pages/about.html'),
    slice40: () => window.location.href = 'mailto:croxroc@gmail.com'
  };

  Object.keys(clickMap).forEach(id => {
    const img = document.getElementById(id);
    if (img) {
      img.style.cursor = 'pointer';
      img.addEventListener('mousedown', e => {
        e.preventDefault();
        clickMap[id]();
      });
    }
  });

  /* ==== MOBILE TAP HANDLING ==== */
  const isTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
  const tapState = {};

  function enableTap(id, action) {
    const img = document.getElementById(id);
    if (!img || !isTouch) return;

    img.addEventListener('touchstart', e => {
      e.preventDefault();
      if (!tapState[id]) {
        // Trigger hover effect/group swap logic on first tap
        const event = new MouseEvent('mouseenter');
        img.dispatchEvent(event);
        
        tapState[id] = true;
        setTimeout(() => tapState[id] = false, 900);
      } else {
        // Double tap triggers the link
        tapState[id] = false;
        action();
      }
    }, { passive:false });
  }

  // Hooking up mobile taps to the same clickMap
  Object.keys(clickMap).forEach(id => enableTap(id, clickMap[id]));

window.addEventListener('load', () => {
  // Wait a moment after the page is 'ready' so we don't block the first view
  setTimeout(() => {
    const imagesToPreload = Object.values(hoverMap); // Get all hover image paths
    
    imagesToPreload.forEach(src => {
      const img = new Image();
      // Ensure the path matches your folder structure (e.g., 'images/' or '../images/pagesimages/')
      img.src = src.includes('/') ? src : '../images/' + src;
    });
    console.log("Hover images preloaded in background.");
  }, 2000); // 2-second delay
});

</script>
