<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="All croxroc® albums, sing-along videos & birthday songs — stream everywhere including Spotify and Apple Music.">
  <link rel="stylesheet" href="../css/styles-albums.css">


<title>croxroc music</title>

<style>
  * { box-sizing: border-box; }

html {
    transform-origin: top left;
  }

html,body {
  height:100%;
  margin:0;
  background:#000;
  cursor:none;
  overflow-x: hidden;
  overflow-y: auto;
}
  
.stage {
    width: 1880px;
    margin: 0 auto;
    image-rendering: pixelated;
  }

.row { display:flex; width:100%; }
.no-wrap { flex-wrap: nowrap; }

.col { display:flex; flex-direction:column; }

img {
    display:block;
    max-width:none;
    user-select:none;
    -webkit-user-drag:none;
    image-rendering: pixelated;
  }
  
  /* === SLICE 10 BACKGROUND SLOT === */
.slice-10 {
  width: 1347px;
  height: 758px;
  position: relative;
  flex-shrink: 0;
  background-image: url("../images/pagesimages/slice10.webp");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  overflow: hidden; /* hide overflow outside */
}
  
  
  /* === GENERIC SLICE CONTAINER === */
.slice-container {
  position: absolute;
 inset: 0;
}

/* === SCROLL LAYER === */
.slice-scroll {
 position: relative; /* NOT absolute */
  width: 100%;
  height: 100%;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 40px 60px 240px;
  }
  
  /* === CONTENT WELL === */
.slice-content {
  min-height: 100%;
  pointer-events: auto; /* ensure buttons inside can be clicked */
}

  /* breathing room */
  padding: 40px 60px 240px;

  /* gentle bottom fade */
  mask-image: linear-gradient(
    to bottom,
    black 88%,
    transparent 100%
  );

  /* scrollbar (Firefox) */
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,0.12) transparent;
}



.slice-content audio,
.slice-content video {
  pointer-events: auto;
  cursor: pointer;
}
/* === SCROLLBAR (BARELY THERE) === */



/* WebKit */
.slice-scroll::-webkit-scrollbar {
  width: 4px;
}

.slice-scroll::-webkit-scrollbar-track {
  background: transparent;
}

.slice-scroll::-webkit-scrollbar-thumb {
  background: rgba(255,255,255,0.08);
  min-height: 40px;
}

.slice-scroll:hover::-webkit-scrollbar-thumb {
  background: rgba(255,255,255,0.25);
}

/* Content layer */
.slice-10-content {
  position: absolute;
  inset: 0;
  z-index: 2;
  padding: 24px;
}

/* Optional readability overlay */
.slice-10::before {
  pointer-events: none;
}
  .top-row { height:173px; }
  .middle { display:flex; height:825px; }

  .col-1 { width:114px; }
  .col-2 { width:1347px; }
  .col-3 { width:419px; }

  .hrow { display:flex; }
  .final-row { display:flex; height:62px; }

  /* ==== CUSTOM CURSOR ==== */
  .custom-cursor {
    position: fixed; /* must be fixed */
    width: 96px;
    height: 96px;
    background: url("../images/icons/dusty.apng") no-repeat center / contain;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
  }

  /* ==== GLOW TRAIL ==== */
  .trail {
    position: fixed;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 9998;
    mix-blend-mode: screen;
    animation: fadeOut 1.2s forwards;
  }

  @keyframes fadeOut {
    to { opacity: 0; transform: scale(2); }
  }
  
 
</style>
</head>

<body>
 
<div class="custom-cursor"></div>

<div class="stage">

<!-- ROW 1 -->

</div>


<!-- ROW 2 -->

  </div>

  <!-- Slice 10 (background version of the original image) -->
<!-- Slice 10 (background version of the original image) -->
<div class="slice-10">

</div>

      <img id="slice13" src="../images/pagesimages/slice13m.webp" width="191" height="356">
      <img src="../images/pagesimages/slice14m.webp" width="78" height="356">
    </div>

    <div class="hrow">
      <img id="slice15" src="../images/pagesimages/slice15m.webp" width="150" height="64">
      <img src="../images/pagesimages/slice16m.webp" width="191" height="64">

</div>

<script>
  /* =========================================
     1. CUSTOM CURSOR & TRAIL
     ========================================= */
  const cursor = document.querySelector('.custom-cursor');
  let hue = 0;

  if (cursor) {
    document.addEventListener('mousemove', e => {
      // Prevent cursor logic if hovering over interactive elements
      if (e.target.closest('audio, video, button, input')) return;

      // Update Cursor Position
      // Since CSS is position:fixed, we use clientX/Y directly (no scroll math needed)
      cursor.style.left = e.clientX + 'px';
      cursor.style.top = e.clientY + 'px';

      // Create Sparkle Trail
      const trail = document.createElement('div');
      trail.className = 'trail';
      trail.style.left = e.clientX + 'px';
      trail.style.top = e.clientY + 'px';
      trail.style.background = `radial-gradient(circle, hsla(${hue},100%,70%,0.9), transparent 70%)`;

      hue = (hue + 8) % 360; // Cycle colors
      document.body.appendChild(trail);

      // Remove trail after animation
      setTimeout(() => trail.remove(), 1200);
    });
  }

  /* =========================================
     2. IMAGE SWAPS (HOVER EFFECTS)
     ========================================= */
  const originals = {};

  function swap(id, file) {
    const img = document.getElementById(id);
    if (!img) return;
    if (!originals[id]) originals[id] = img.src;
    img.src = '../images/pagesimages/' + file;
  }

  function restore(id) {
    if (originals[id]) document.getElementById(id).src = originals[id];
  }

  function hoverSwap(id, file) {
    const img = document.getElementById(id);
    if (!img) return;
    img.addEventListener('mouseenter', () => swap(id, file));
    img.addEventListener('mouseleave', () => restore(id));
  }

  // Initialize Hovers
  hoverSwap('slice2', 'slice2mh.webp');
  hoverSwap('slice3', 'slice3h.webp');
  hoverSwap('slice4', 'slice4h.webp');
  hoverSwap('slice5', 'slice5h.webp');
  hoverSwap('slice9', 'slice9h.webp');
  hoverSwap('slice13', 'slice13h.webp');
  hoverSwap('slice15', 'slice15h.webp');


  /* =========================================
     3. NAVIGATION & TOUCH HANDLING
     ========================================= */
  const isTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
  const tapState = {};

  function enableTap(id, hoverFile, action) {
    const img = document.getElementById(id);
    if (!img) return;

    if (isTouch) {
      // Mobile: Tap once to swap image, Tap again to go
      tapState[id] = false;

      img.addEventListener('touchend', e => {
        if (!tapState[id]) {
          // First tap -> Show hover image
          if (hoverFile) {
            if (!originals[id]) originals[id] = img.src;
            img.src = img.src.replace(/[^/]+$/, hoverFile);
          }
          tapState[id] = true;
          setTimeout(() => tapState[id] = false, 900); // Reset after 900ms
        } else {
          // Second tap -> Go
          tapState[id] = false;
          action();
        }
      }, { passive: false });
    } else {
      // Desktop: Just click to go
      img.addEventListener('mousedown', action);
      img.style.cursor = 'pointer';
    }
  }

  // Setup Navigation Links
  enableTap('slice3', 'slice3h.webp', () => location.href = 'games.html');
  enableTap('slice4', 'slice4h.webp', () => location.href = 'books.html');
  enableTap('slice5', 'slice5h.webp', () => location.href = 'about.html');
  enableTap('slice9', 'slice9h.webp', () => location.href = '../index.html');
  enableTap('slice15', 'slice15h.webp', () => location.href = 'mailto:croxroc@gmail.com');

</script>

<script src="../js/carousel.js"></script>

</body>
