<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>Seamless Slice Grid + Glow Trail</title>

<style>
  * { box-sizing: border-box; }

html {
    transform-origin: top left;
  }

html,body {
  height:100%;
  margin:0;
  background:#000;
  cursor:none;
  overflow:hidden;
}

.layout {
  display: grid;
  grid-template-columns: 40% 60%;
  height: 100vh;
}

.rail {
  display: flex;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
}

.character {
  min-width: 100%;
  scroll-snap-align: start;
  display: grid;
  place-items: center;
  font-size: 3rem;
  cursor: pointer;
}

.details {
  padding: 2rem;
  border-left: 1px solid #ccc;
}

                                                                       
  .stage {
    width: 1880px;
    margin: 0 auto;
    image-rendering: pixelated;
  }

  .row { display:flex; width:100%; }
  .no-wrap { flex-wrap: nowrap; }

  .col { display:flex; flex-direction:column; }

  img {
    display:block;
    max-width:none;
    user-select:none;
    -webkit-user-drag:none;
    image-rendering: pixelated;
  }
                                                                       
  /* === SLICE 10 BACKGROUND SLOT === */
.slice-10 {
  width: 1347px;      /* exact original slice width */
  height: 758px;      /* exact original slice height */
  position: relative;
  flex-shrink: 0;

  background-image: url("../images/pagesimages/slice10.webp");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}
                                                          
/* Make rail scrollable within slice-10 */
.slice-10 .rail {
  display: flex;
  overflow-x: auto;       /* allow scrolling */
  scroll-snap-type: x mandatory;
  height: 200px;          /* ensure it has height */
}

/* Make characters a fixed width to scroll correctly */
.slice-10 .character {
  min-width: 150px;       /* fixed width, so you can scroll */
  height: 150px;           /* visible height */
  scroll-snap-align: start;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 3rem;
  background: #444;
  color: white;
  margin-right: 10px;     /* spacing */
  cursor: pointer;
}

/* Content layer */
.slice-10-content {
  position: absolute;
  inset: 0;
  z-index: 2;
  padding: 24px;
}

/* Optional readability overlay */
.slice-10::before {
  content: "";
  position: absolute;
  inset: 0;
  z-index: 1;
}
                                                                     

  .top-row { height:173px; }
  .middle { display:flex; height:825px; }

  .col-1 { width:114px; }
  .col-2 { width:1347px; }
  .col-3 { width:419px; }

  .hrow { display:flex; }
  .final-row { display:flex; height:62px; }

  /* ==== CUSTOM CURSOR ==== */
  .custom-cursor {
    position: fixed;
    width: 96px;
    height: 96px;
    background: url("../images/icons/dusty.apng") no-repeat center / contain;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
  }

  /* ==== GLOW TRAIL ==== */
  .trail {
    position: fixed;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 9998;
    mix-blend-mode: screen;
    animation: fadeOut 1.2s forwards;
  }

  @keyframes fadeOut {
    to { opacity: 0; transform:scale(2); }
  }
</style>
</head>

<body>

<div class="custom-cursor"></div>

<div class="stage">

<!-- ROW 1 -->
<div class="row top-row no-wrap">
  <img src="../images/pagesimages/slice1.webp" width="114" height="173">
  <img id="slice2" src="../images/pagesimages/slice2.webp" width="167" height="173">
  <img id="slice3" src="../images/pagesimages/slice3.webp" width="167" height="173">
  <img id="slice4" src="../images/pagesimages/slice4.webp" width="168" height="173">
  <img id="slice5" src="../images/pagesimages/slice5a.webp" width="167" height="173">
  <img src="../images/pagesimages/slice6.webp" width="438" height="173">
  <img src="../images/pagesimages/slice7a.webp" width="659" height="173">
</div>

<!-- ROW 2 -->
<div class="middle">
  <div class="col col-1">
    <img src="../images/pagesimages/slice8.webp" width="114" height="758">
    <img id="slice9" src="../images/pagesimages/slice9.webp" width="114" height="67">
  </div>

 <!-- Slice 10 (content goes here) -->
<div class="layout">
  <!-- LEFT: Character Rail -->
  <div class="rail" id="rail">
    <div class="character" data-id="0"><img src="/images/1.webp" alt="Character 1"></div>
    <div class="character" data-id="1"><img src="/images/2.webp" alt="Character 2"></div>
    <div class="character" data-id="2"><img src="/images/3.webp" alt="Character 3"></div>
    <div class="character" data-id="3"><img src="/images/4.webp" alt="Character 4"></div>
    <div class="character" data-id="4"><img src="/images/5.webp" alt="Character 5"></div>
    <div class="character" data-id="5"><img src="/images/6.webp" alt="Character 6"></div>
    <div class="character" data-id="6"><img src="/images/7.webp" alt="Character 7"></div>
    <div class="character" data-id="7"><img src="/images/8.webp" alt="Character 8"></div>
    <div class="character" data-id="8"><img src="/images/9.webp" alt="Character 9"></div>
    <div class="character" data-id="9"><img src="/images/10.webp" alt="Character 10"></div>
  </div>

  <!-- RIGHT: Character Details -->
  <div class="details" id="details">
    <h2 id="name">Character 1</h2>
    <p id="bio">Details for Character 1.</p>
  </div>
</div>


   <!-- Slice 10 (content STOPS here) -->

  <div class="col col-3">
    <img src="../images/pagesimages/slice11a.webp" width="419" height="405">

    <div class="hrow">
      <img src="../images/pagesimages/slice12a.webp" width="150" height="356">
      <img id="slice13" src="../images/pagesimages/slice13a.webp" width="191" height="356">
      <img src="../images/pagesimages/slice14a.webp" width="78" height="356">
    </div>

    <div class="hrow">
      <img id="slice15" src="../images/pagesimages/slice15a.webp" width="150" height="64">
      <img src="../images/pagesimages/slice16a.webp" width="191" height="64">
      <img src="../images/pagesimages/slice17a.webp" width="78" height="64">
    </div>
  </div>
</div>

<!-- ROW 3 -->
<div class="final-row">
  <img src="../images/pagesimages/slice18a.webp" width="114" height="62">
  <img src="../images/pagesimages/slice19a.webp" width="1347" height="62">
  <img src="../images/pagesimages/slice20a.webp" width="150" height="62">
  <img src="../images/pagesimages/slice21a.webp" width="191" height="62">
  <img src="../images/pagesimages/slice22a.webp" width="78" height="62">
</div>

</div>

<script>
/* ==== CURSOR + TRAIL ==== */
const cursor = document.querySelector('.custom-cursor');
let hue = 0;

document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top  = e.clientY + 'px';

  const trail = document.createElement('div');
  trail.className = 'trail';
  trail.style.left = e.clientX + 'px';
  trail.style.top  = e.clientY + 'px';
  trail.style.background =
    `radial-gradient(circle, hsla(${hue},100%,70%,0.9), transparent 70%)`;

  hue = (hue + 8) % 360;
  document.body.appendChild(trail);
  setTimeout(() => trail.remove(), 1200);
});

/* ==== IMAGE SWAPS ==== */
const originals = {};

function swap(id, file) {
  const img = document.getElementById(id);
  if (!img) return;
  if (!originals[id]) originals[id] = img.src;
  img.src = '../images/pagesimages/' + file;
}

function restore(id) {
  if (originals[id]) document.getElementById(id).src = originals[id];
}

function hoverSwap(id, file) {
  const img = document.getElementById(id);
  img.addEventListener('mouseenter', () => swap(id, file));
  img.addEventListener('mouseleave', () => restore(id));
}

/* Hover swaps */
hoverSwap('slice2','slice2h.webp');
hoverSwap('slice3','slice3h.webp');
hoverSwap('slice4','slice4h.webp');
hoverSwap('slice5','slice5ah.webp');
hoverSwap('slice9','slice9h.webp');
hoverSwap('slice13','slice13h.webp');
hoverSwap('slice15','slice15h.webp');

/* ==== MOBILE TAP HANDLING (SAFE LAYER) ==== */

const isTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
const tapState = {};

function enableTap(id, hoverFile, action) {
  const img = document.getElementById(id);
  if (!img || !isTouch) return;

  tapState[id] = false;

  img.addEventListener('touchstart', e => {
    e.preventDefault();

    if (!tapState[id]) {
      // First tap → hover swap
      if (hoverFile) {
        if (!originals[id]) originals[id] = img.src;
        img.src = img.src.replace(/[^/]+$/, hoverFile);
      }
      tapState[id] = true;

      // Auto-reset if user doesn’t tap again
      setTimeout(() => tapState[id] = false, 900);
    } else {
      // Second tap → action
      tapState[id] = false;
      action();
    }
  }, { passive:false });
}

/* Navigation */
document.getElementById('slice2').onmousedown = () => location.href='music.html';
document.getElementById('slice3').onmousedown = () => location.href='games.html';
document.getElementById('slice4').onmousedown = () => location.href='books.html';
document.getElementById('slice9').onmousedown = () => location.href='../index.html';
document.getElementById('slice15').onmousedown = () =>
  location.href='mailto:croxroc@gmail.com';
  
  /* ==== TAP ENABLE (MATCHES DESKTOP BEHAVIOUR) ==== */

enableTap('slice2', 'slice2h.webp', () => location.href='music.html');
enableTap('slice3', 'slice3h.webp', () => location.href='games.html');
enableTap('slice4', 'slice4h.webp', () => location.href='books.html');

enableTap('slice9', 'slice9h.webp', () => location.href='../index.html');

enableTap('slice13', 'slice13h.webp', () => location.href='games.html');

enableTap('slice15', 'slice15h.webp', () =>
  location.href='mailto:croxroc@gmail.com'
);

/* Pointer hint */
['slice2','slice3','slice4','slice9','slice15','slice13'].forEach(id => {
  const img = document.getElementById(id);
  if (img) img.style.cursor = 'pointer';
});
                                                                       
                                                                       const data = [
  { name: "Character A", bio: "Bio A" },
  { name: "Character B", bio: "Bio B" },
  { name: "Character C", bio: "Bio C" }
];

const rail = document.getElementById("rail");
const name = document.getElementById("name");
const bio = document.getElementById("bio");

rail.addEventListener("click", (e) => {
  const card = e.target.closest(".character");
  if (!card) return;

  const id = Number(card.dataset.id);

  // move character to left
  rail.scrollTo({
    left: card.offsetLeft,
    behavior: "smooth"
  });

  // update details
  name.textContent = data[id].name;
  bio.textContent = data[id].bio;
});

                      
</script>

</body>
</html>
