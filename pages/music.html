<style>
  * { box-sizing: border-box; }
  
  html, body {
    height: 100dvh;
    margin: 0;
    padding: 0;
    background: #000;
    overflow: hidden;
    cursor: none;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  /* --- STAGE: Auto-Scaling Container --- */
  .stage {
    position: relative;
    width: 1880px;
    height: 1060px; /* Matches total slice height: 173 + 825 + 62 */
    background: #000;
    transform-origin: center center;
    flex-shrink: 0;
    image-rendering: crisp-edges;
    overflow: hidden;
  }

  /* --- GAP FIXES --- */
  .row, .hrow { display: flex; flex-wrap: nowrap; }
  .row img + img, .hrow img + img { margin-left: -1px; }
  .middle { margin-top: -1px; display: flex; height: 825px; }
  .final-row { margin-top: -1px; height: 62px; }
  .col img + img { margin-top: -1px; }

  /* Stretch fix for top-right image */
  .top-row img:last-child { flex-grow: 1; width: auto; object-fit: cover; }

  img {
    display: block;
    margin: 0;
    padding: 0;
    max-width: none;
    user-select: none;
    -webkit-user-drag: none;
  }

  /* --- LAYOUT PIECES --- */
  .top-row { height: 173px; }
  .col-1 { width: 114px; }
  .col-3 { width: 419px; }

    width: 1347px;
    height: 758px;
    position: relative;
    flex-shrink: 0;
    background-image: url("../images/pagesimages/slice10.webp");
    background-size: cover;
    background-position: center;
    overflow: hidden;
  }

  .slice-scroll {
    position: absolute;
    inset: 0;
    overflow-y: auto;
    overflow-x: hidden;
    padding-top: 40px;
    padding-bottom: 100px;
    z-index: 50;
    scrollbar-width: thin;
  }

  .slice-scroll::-webkit-scrollbar { width: 8px; }
  .slice-scroll::-webkit-scrollbar-track { background: transparent; }
  .slice-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

  /* === CAROUSEL STYLES === */
  #album-container { width: 100%; display: flex; flex-direction: column; gap: 80px; align-items: center; }
  .album-wrapper { position: relative; width: 100%; max-width: 900px; height: 320px; display: flex; flex-direction: column; align-items: center; }
  .album-title { color: #fff; font-size: 28px; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 20px; text-shadow: 0 2px 10px #000; }
  .scene { position: relative; width: 100%; height: 240px; perspective: 1000px; display: flex; justify-content: center; align-items: center; pointer-events: none; }
  .carousel { position: relative; width: 160px; height: 200px; transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); }

  .tile { 
    position: absolute; width: 160px; height: 200px; border-radius: 18px; background: #1b1b22; 
    transform-style: preserve-3d; box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
    transition: opacity 0.6s, box-shadow 0.3s, transform 0.6s; pointer-events: auto !important; overflow: hidden;
  }
  .tile.playing { border: 2px solid #fff; box-shadow: 0 0 30px hsla(var(--hue, 0), 80%, 60%, 0.8); z-index: 1000 !important; }
  .tile-content { position: absolute; inset: 0; display: flex; flex-direction: column; background: #111; }
  .tile-content .image { width: 100%; height: 120px; position: relative; }
  .tile-content .image img { width: 100%; height: 100%; object-fit: cover; }
  .tile-content .title { margin-top: 15px; text-align: center; font-size: 11px; color: #ccc; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding: 0 8px; }

  .play {
    position: absolute; bottom: -18px; left: 50%; transform: translateX(-50%);
    width: 44px; height: 44px; border-radius: 50%; background: rgba(0,0,0,0.9); border: 2px solid #fff;
    color: #fff; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 1000;
  }
  .play:hover { background: #ff0055; transform: translateX(-50%) scale(1.1); }

  .icons { margin-top: auto; padding-bottom: 10px; display: flex; justify-content: space-evenly; }
  .icon-link img { width: 22px; height: 22px; opacity: 0.6; transition: 0.2s; }
  .icon-link:hover img { opacity: 1; transform: scale(1.2); }

  .nav-btn {
    position: absolute; top: 60%; transform: translateY(-50%); width: 60px; height: 60px;
    background: rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.3); border-radius: 50%;
    color: white; font-size: 30px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; z-index: 100; transition: 0.2s; user-select: none;
  }
  .nav-btn:hover { background: #ff0055; border-color: #fff; }
  .prev-btn { left: 0px; }
  .next-btn { right: 0px; }

  /* === CUSTOM CURSOR & TRAIL === */
  .custom-cursor {
    position: fixed; width: 96px; height: 96px;
    background: url("../images/icons/dusty.webp") no-repeat center / contain;

  }
  .trail {
    position: fixed; width: 40px; height: 40px; border-radius: 50%;
    pointer-events: none; z-index: 999998; mix-blend-mode: screen;
    filter: blur(4px); animation: fadeOut 0.8s forwards;
  }
  @keyframes fadeOut { to { opacity: 0; transform: scale(2); } }
  
  .album-wrapper {
  content-visibility: auto;
  contain-intrinsic-size: 1px 320px; /* Helps the browser guess the height before loading */
}

<script>
/* ---------- AUTO-SCALING ---------- */
const stage = document.getElementById('mainStage');
const baseWidth = 1880, baseHeight = 1060;

function handleResize() {
  const scale = Math.min(window.innerWidth / baseWidth, window.innerHeight / baseHeight);
  stage.style.transform = `scale(${scale})`;
}
window.addEventListener('resize', handleResize);
window.addEventListener('load', handleResize);
handleResize();

/* ---------- CURSOR & TRAIL ---------- */
const cursor = document.getElementById('cursorAnim');
const colors = ['#ff0040','#ff7b00','#ffe600','#2bff00','#00ffc8','#00aaff','#8f00ff'];
let colorIndex = 0;

document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top  = e.clientY + 'px';
  const dot = document.createElement('div');
  dot.className = 'trail';
  dot.style.background = colors[colorIndex];
  colorIndex = (colorIndex + 1) % colors.length;
  dot.style.left = (e.clientX - 20) + 'px';
  dot.style.top  = (e.clientY - 20) + 'px';
  document.body.appendChild(dot);
  setTimeout(() => dot.remove(), 800);
});

/* ---------- IMAGE SWAPS & NAV ---------- */
const originals = {};
function swap(id, file) {
  const img = document.getElementById(id);
  if (!img) return;
  if (!originals[id]) originals[id] = img.src;
  img.src = '../images/pagesimages/' + file;
}
function restore(id) {
  if (originals[id]) document.getElementById(id).src = originals[id];
}

const hoverMap = {
  slice2: 'slice2mh.webp', slice3: 'slice3h.webp',
  slice4: 'slice4h.webp', slice5: 'slice5h.webp',
  slice9: 'slice9h.webp', slice13: 'slice13mh.webp', 
  slice15: 'slice15mh.webp'
};

Object.keys(hoverMap).forEach(id => {
  const img = document.getElementById(id);
  if (!img) return;
  img.addEventListener('mouseenter', () => swap(id, hoverMap[id]));
  img.addEventListener('mouseleave', () => restore(id));
});

const navMap = {
  slice2: 'music.html', slice3: 'games.html', 
  slice4: 'books.html', slice5: 'about.html',
  slice9: '../index.html', slice15: 'mailto:croxroc@gmail.com'
};

Object.keys(navMap).forEach(id => {
  const img = document.getElementById(id);
  if (!img) return;
  img.style.cursor = 'pointer';
  img.addEventListener('mousedown', () => { window.location.href = navMap[id]; });
});

    tile.style.setProperty("--hue", album.hue);
    tile.innerHTML = `
      <div class="tile-content">
        <div class="image">
          <img src="../images/track-art/${trackCounter}.jpg" onerror="this.src='../images/track-art/default.jpg'">
          <button class="play">▶</button>
        </div>
        <div class="title">${data.title}</div>
        <div class="icons">
          <a href="${data.links.apple || '#'}" target="_blank" class="icon-link"><img src="../images/icons/am.png"></a>
          <a href="${data.links.spotify || '#'}" target="_blank" class="icon-link"><img src="../images/icons/sm.png"></a>
          <a href="${data.links.youtube || '#'}" target="_blank" class="icon-link"><img src="../images/icons/yt.png"></a>
          <a href="${data.links.amazon || '#'}" target="_blank" class="icon-link"><img src="../images/icons/az.png"></a>
        </div>
      </div>
      <audio src="../audio/${trackCounter}.mp3"></audio>
    `;

    const playBtn = tile.querySelector(".play");
    const audio = tile.querySelector("audio");

    playBtn.onclick = (e) => {
      e.stopPropagation();
      if (currentAudio === audio) {
        stopAudio();
      } else {
        stopAudio();
        currentAudio = audio;
        currentTile = tile;
        tile.classList.add("playing");
        audio.play().catch(console.error);
        audio.onended = stopAudio;
      }
      render();
    };

    carousel.appendChild(tile);
    tiles.push(tile);
    trackCounter++;
  }

  let index = 0;
  const render = () => {
    tiles.forEach((tile, i) => {
      let rel = i - index;
      const total = tiles.length;
      if (rel > total / 2) rel -= total;
      if (rel < -total / 2) rel += total;

      const angleStep = 25;
      const radius = 280;
      const a = rel * angleStep * Math.PI / 180;
      const absRel = Math.abs(rel);
      
      let baseScale = (rel === 0) ? 1.15 : 0.95;
      if (tile.classList.contains('playing')) baseScale = 1.3;

      tile.style.transform = `translateX(${radius * Math.sin(a)}px) translateZ(${radius * Math.cos(a) - radius}px) rotateY(${rel * -15}deg) scale(${baseScale})`;
      tile.style.opacity = absRel > 4 ? 0.2 : (absRel > 2 ? 0.5 : 1);
      tile.style.zIndex = Math.round(100 - absRel);
      if (tile.classList.contains('playing')) tile.style.zIndex = 999;
      tile.style.pointerEvents = absRel > 1 ? 'none' : 'auto';
    });
  };

  wrapper.querySelector(".prev-btn").onclick = () => { index--; render(); };
  wrapper.querySelector(".next-btn").onclick = () => { index++; render(); };
  render();
  albumContainer.appendChild(wrapper);
});

function stopAudio() {
  if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }
  if (currentTile) currentTile.classList.remove("playing");
  currentAudio = null; currentTile = null;
}

document.addEventListener('click', (e) => {
  if (!e.target.closest('.play') && !e.target.closest('.nav-btn')) {
    stopAudio();
    document.querySelectorAll('.tile').forEach(t => t.style.zIndex = t.style.zIndex); 
  }
});

window.addEventListener('load', () => {
  // Wait a moment after the page is 'ready' so we don't block the first view
  setTimeout(() => {
    const imagesToPreload = Object.values(hoverMap); // Get all hover image paths
    
    imagesToPreload.forEach(src => {
      const img = new Image();
      // Ensure the path matches your folder structure (e.g., 'images/' or '../images/pagesimages/')
      img.src = src.includes('/') ? src : '../images/pagesimages/' + src;
    });
    console.log("Hover images preloaded in background.");
  }, 2000); // 2-second delay
});

</script>
